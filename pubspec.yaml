name: cs2_simulator
description: "Counter-Strike 2 case opening and Trade-Up contract creation simulator written in Flutter + Dart."
publish_to: 'none'

version: 0.6.0

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/skins/
    - assets/cases/
    - assets/reward_collections/
