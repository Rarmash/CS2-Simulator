name: Build and upload release assets

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  APP_NAME: cs2-simulator
  TAG: ${{ github.event.release.tag_name }}

jobs:
  build-linux-android-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable platforms
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-web

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev zip

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Linux
        run: flutter build linux --release

      - name: Build Web
        run: flutter build web --release

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist

          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/${APP_NAME}-${TAG}-android.apk"

          cd build/linux/x64/release
          zip -r "../../../../dist/${APP_NAME}-${TAG}-linux-x64.zip" bundle
          cd ../../../../

          cd build/web
          zip -r "../../dist/${APP_NAME}-${TAG}-web.zip" .
          cd ../..

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.APP_NAME }}-${{ env.TAG }}-android.apk
            dist/${{ env.APP_NAME }}-${{ env.TAG }}-linux-x64.zip
            dist/${{ env.APP_NAME }}-${{ env.TAG }}-web.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Pack Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "dist\${env:APP_NAME}-${env:TAG}-windows-x64.zip" `
            -Force

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-windows-x64.zip

  build-apple:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable Apple platforms
        run: |
          flutter config --enable-macos-desktop

      - name: Build macOS
        run: flutter build macos --release

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Prepare Apple artifacts
        shell: bash
        run: |
          mkdir -p dist

          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent "Runner.app" \
            "../../../../dist/${APP_NAME}-${TAG}-macos.zip"
          cd ../../../../../

          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          cd Payload/..
          zip -r "dist/${APP_NAME}-${TAG}-ios-unsigned.ipa" Payload
          rm -rf Payload

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.APP_NAME }}-${{ env.TAG }}-macos.zip
            dist/${{ env.APP_NAME }}-${{ env.TAG }}-ios-unsigned.ipa