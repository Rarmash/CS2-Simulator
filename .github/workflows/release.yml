name: Build and upload release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux-android-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable platforms
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-web

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Linux
        run: flutter build linux --release

      - name: Build Web
        run: flutter build web --release

      - name: Prepare release files
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          cp build/app/outputs/flutter-apk/app-release.apk \
            "cs2-simulator-${TAG}-android.apk"

          cd build/linux/x64/release
          zip -r "../../../../cs2-simulator-${TAG}-linux-x64.zip" bundle
          cd ../../../../

          cd build/web
          zip -r "../../cs2-simulator-${TAG}-web.zip" .
          cd ../..

      - name: Upload Linux/Android/Web to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cs2-simulator-${{ github.ref_name }}-android.apk
            cs2-simulator-${{ github.ref_name }}-linux-x64.zip
            cs2-simulator-${{ github.ref_name }}-web.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Pack Windows build
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "cs2-simulator-$tag-windows-x64.zip" `
            -Force

      - name: Upload Windows to release
        uses: softprops/action-gh-release@v2
        with:
          files: cs2-simulator-${{ github.ref_name }}-windows-x64.zip