name: Build and upload release assets

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  APP_NAME: cs2-simulator
  TAG: ${{ github.event.release.tag_name }}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate latest app icon source
        run: dart run tool/generate_app_icon.dart

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Android APK
        run: flutter build apk --release

      - name: Prepare Android artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/${APP_NAME}-${TAG}-android.apk"

      - name: Upload Android asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-android.apk

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate latest app icon source
        run: dart run tool/generate_app_icon.dart

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev zip

      - name: Build Linux
        run: flutter build linux --release

      - name: Pack Linux build
        shell: bash
        run: |
          mkdir -p dist
          cd build/linux/x64/release
          zip -r "../../../../dist/${APP_NAME}-${TAG}-linux-x64.zip" bundle
          cd ../../../../

      - name: Upload Linux asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-linux-x64.zip

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable Web
        run: flutter config --enable-web

      - name: Build Web
        run: flutter build web --release

      - name: Pack Web build
        shell: bash
        run: |
          mkdir -p dist
          cd build/web
          zip -r "../../dist/${APP_NAME}-${TAG}-web.zip" .
          cd ../..

      - name: Upload Web asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-web.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate latest app icon source
        run: dart run tool/generate_app_icon.dart

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Pack Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "dist\${env:APP_NAME}-${env:TAG}-windows-x64.zip" `
            -Force

      - name: Upload Windows asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-windows-x64.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate latest app icon source
        run: dart run tool/generate_app_icon.dart

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS
        run: flutter build macos --release

      - name: Pack macOS build
        shell: bash
        run: |
          mkdir -p dist

          MACOS_APP="$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -n 1)"

          if [ -z "$MACOS_APP" ]; then
            echo "No .app found in build/macos/Build/Products/Release"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$MACOS_APP" \
            "dist/${APP_NAME}-${TAG}-macos.zip"

      - name: Upload macOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-macos.zip

  build-ios-unsigned:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate latest app icon source
        run: dart run tool/generate_app_icon.dart

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Pack iOS unsigned IPA
        shell: bash
        run: |
          mkdir -p dist
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          cd Payload/..
          zip -r -y "dist/${APP_NAME}-${TAG}-ios-unsigned.ipa" Payload
          rm -rf Payload

      - name: Upload iOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.TAG }}-ios-unsigned.ipa